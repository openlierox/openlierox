name: Build

on:
  pull_request:
  push:
    branches:
      - 0.59

jobs:
  build-linux:
    name: Build (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    if: false  # temporarily disabled to iterate on the macOS pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            dpkg-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libxml2-dev \
            libgd-dev \
            zlib1g-dev \
            libzip-dev \
            libx11-dev \
            libcurl4-openssl-dev \
            libboost-dev \
            libopenal-dev \
            libalut-dev \
            libvorbis-dev \
            binutils-dev \
            libiberty-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DHAWKNL_BUILTIN=Yes

      - name: Build
        run: |
          mkdir -p build/bin
          cmake --build build -j$(nproc)

      - name: Package (.deb)
        run: ./package-deb.sh

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: openlierox-deb
          path: openlierox_*.deb
          if-no-files-found: error

  build-windows:
    name: Build Windows .exe (MSYS2 MinGW64)
    runs-on: windows-2022
    if: false  # temporarily disabled to iterate on the macOS pipeline
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-libgd
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libzip
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openal
            mingw-w64-x86_64-freealut
            mingw-w64-x86_64-libvorbis
            mingw-w64-x86_64-ntldd-git
            zip

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release \
            -DHAWKNL_BUILTIN=Yes \
            -DLIBZIP_BUILTIN=No \
            -DLIBLUA_BUILTIN=Yes \
            -DBREAKPAD=No \
            -DHASBFD=No \
            -DDEBUG=No

      - name: Build
        run: |
          mkdir -p build/bin
          cmake --build build -j$(nproc)

      - name: Package (.zip)
        run: ./package-windows.sh

      - name: Upload .zip
        uses: actions/upload-artifact@v4
        with:
          name: openlierox-windows
          path: openlierox_*_win64.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS .app (Homebrew)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew update
          brew install \
            cmake \
            ninja \
            pkg-config \
            sdl2 \
            sdl2_image \
            sdl2_mixer \
            libzip \
            gd \
            libvorbis \
            openal-soft \
            freealut \
            boost \
            dylibbundler

      - name: Configure
        run: |
          # libxml2 and openal-soft are keg-only on Homebrew (macOS ships
          # its own OpenAL.framework and libxml2), so expose their .pc
          # files to pkg-config explicitly.
          LIBXML2_PREFIX="$(brew --prefix libxml2)"
          OPENAL_PREFIX="$(brew --prefix openal-soft)"
          export PKG_CONFIG_PATH="${LIBXML2_PREFIX}/lib/pkgconfig:${OPENAL_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          cmake -S . -B build -G Ninja \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release \
            -DHAWKNL_BUILTIN=Yes \
            -DLIBZIP_BUILTIN=No \
            -DLIBLUA_BUILTIN=Yes \
            -DBREAKPAD=No \
            -DHASBFD=No \
            -DDEBUG=No

      - name: Build
        run: |
          mkdir -p build/bin
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package (.app)
        run: ./package-macos.sh

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: openlierox-macos
          path: openlierox_*_macos.zip
          if-no-files-found: error
