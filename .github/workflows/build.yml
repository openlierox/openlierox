name: Build

on:
  pull_request:
  push:
    branches:
      - 0.59
      - master

jobs:
  build-linux:
    name: Build (Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libxml2-dev \
            libgd-dev \
            zlib1g-dev \
            libzip-dev \
            libx11-dev \
            libcurl4-openssl-dev \
            libboost-dev \
            libopenal-dev \
            libalut-dev \
            libvorbis-dev \
            binutils-dev \
            libiberty-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DHAWKNL_BUILTIN=Yes

      - name: Build
        run: cmake --build build -j$(nproc)
