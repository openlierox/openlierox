name: Beta Release

# Runs whenever a PR is merged (i.e. a push lands) on a release branch.
# It builds every platform by reusing the existing package-* pipelines,
# then publishes/refreshes a rolling pre-release on GitHub with all the
# freshly built artifacts attached.
on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  # Reuse the existing build pipelines. secrets: inherit lets the Android
  # job reach the signing / Play Store secrets just like before.
  android:
    uses: ./.github/workflows/package-android.yml
    secrets: inherit

  linux-bundle:
    uses: ./.github/workflows/package-linux-bundle.yml
    secrets: inherit

  linux-deb:
    uses: ./.github/workflows/package-linux-deb.yml
    secrets: inherit

  mac:
    uses: ./.github/workflows/package-mac.yml
    secrets: inherit

  windows:
    uses: ./.github/workflows/package-windows.yml
    secrets: inherit

  wasm:
    uses: ./.github/workflows/package-wasm.yml
    secrets: inherit

  release:
    name: Publish beta release
    needs: [android, linux-bundle, linux-deb, mac, windows, wasm]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history so git can compute an unambiguous --short length.
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Determine version and tag
        id: meta
        run: |
          set -euo pipefail
          # Short version (no hash) for the artifact filenames / notes;
          # full version (with the +git.HASH provenance) for the release
          # title, which should still identify the exact commit.
          VERSION="$(./get_version.sh)"
          VERSION_FULL="$(./get_version_full.sh)"
          # One rolling pre-release per release branch, refreshed each merge.
          TAG="${GITHUB_REF_NAME}-beta-latest"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_full=${VERSION_FULL}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Artifacts to publish:"
          ls -la dist

      - name: Publish rolling beta pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          VERSION_FULL: ${{ steps.meta.outputs.version_full }}
        run: |
          set -euo pipefail

          NOTES="$(cat <<EOF
          Automated beta build of OpenLieroX **${VERSION}**.

          - Branch: \`${GITHUB_REF_NAME}\`
          - Commit: ${GITHUB_SHA}

          This is a rolling pre-release that is refreshed on every merge. The
          attached artifacts always reflect the latest build of this branch.
          EOF
          )"

          # Every package pipeline now uploads a single ready-to-publish file
          # (the bundle pipelines zip themselves so file permissions / the
          # executable bit survive). The directory handling below is kept as a
          # safety net: gh can only upload files, so any top-level directory is
          # zipped first before collecting the flat list of assets.
          shopt -s nullglob
          ASSETS=()
          for entry in dist/*; do
            if [ -d "$entry" ]; then
              ( cd dist && zip -r -q "$(basename "$entry").zip" "$(basename "$entry")" )
              ASSETS+=("${entry}.zip")
            else
              ASSETS+=("$entry")
            fi
          done

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "No artifacts found to publish" >&2
            exit 1
          fi

          echo "Publishing assets:"
          printf '  %s\n' "${ASSETS[@]}"

          # Recreate the rolling release/tag so it points at this commit and
          # carries only the current build's artifacts.
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true

          gh release create "$TAG" \
            --title "OpenLieroX ${VERSION_FULL} (latest beta)" \
            --notes "$NOTES" \
            --prerelease \
            --target "$GITHUB_SHA" \
            "${ASSETS[@]}"
