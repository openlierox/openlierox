name: Latest master

# Runs whenever a PR is merged (i.e. a push lands) on a release branch.
# It builds every platform by reusing the existing package-* pipelines,
# then publishes a single GitHub release per build, tagged with the version
# and flagged "Latest". Releases from previous builds are left untouched.
on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  # Reuse the existing build pipelines. secrets: inherit lets the Android
  # job reach the signing / Play Store secrets just like before.
  android:
    uses: ./.github/workflows/package-android.yml
    secrets: inherit

  # Publish to the Play Store only on merge, after the Android build has
  # produced and uploaded the signed bundle. PRs build but never publish.
  publish-google-play:
    needs: android
    uses: ./.github/workflows/publish-to-google-play.yaml
    secrets: inherit

  linux-bundle:
    uses: ./.github/workflows/package-linux-bundle.yml
    secrets: inherit

  linux-deb:
    uses: ./.github/workflows/package-linux-deb.yml
    secrets: inherit

  mac:
    uses: ./.github/workflows/package-mac.yml
    secrets: inherit

  windows:
    uses: ./.github/workflows/package-windows.yml
    secrets: inherit

  wasm:
    uses: ./.github/workflows/package-wasm.yml
    secrets: inherit

  release:
    name: Publish latest master release
    needs: [android, linux-bundle, linux-deb, mac, windows, wasm]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history so git can compute an unambiguous --short length.
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Determine version and tag
        id: meta
        run: |
          set -euo pipefail
          # The release is tagged with the short version (no hash); the full
          # version (with the +git.HASH provenance) goes in the release title
          # so it still identifies the exact commit.
          VERSION="$(./get_version.sh)"
          VERSION_FULL="$(./get_version_full.sh)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_full=${VERSION_FULL}" >> "$GITHUB_OUTPUT"
          echo "Artifacts to publish:"
          ls -la dist

      - name: Publish latest master release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          VERSION_FULL: ${{ steps.meta.outputs.version_full }}
        run: |
          set -euo pipefail

          NOTES="$(cat <<EOF
          Automated build of OpenLieroX **${VERSION}**.

          - Branch: \`${GITHUB_REF_NAME}\`
          - Commit: ${GITHUB_SHA}
          EOF
          )"

          # Every package pipeline now uploads a single ready-to-publish file
          # (the bundle pipelines zip themselves so file permissions / the
          # executable bit survive). The directory handling below is kept as a
          # safety net: gh can only upload files, so any top-level directory is
          # zipped first before collecting the flat list of assets.
          shopt -s nullglob
          ASSETS=()
          for entry in dist/*; do
            if [ -d "$entry" ]; then
              ( cd dist && zip -r -q "$(basename "$entry").zip" "$(basename "$entry")" )
              ASSETS+=("${entry}.zip")
            else
              ASSETS+=("$entry")
            fi
          done

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "No artifacts found to publish" >&2
            exit 1
          fi

          echo "Publishing assets:"
          printf '  %s\n' "${ASSETS[@]}"

          # One release per build, tagged with the bare version and flagged as
          # GitHub's "Latest". The version is derived from the (always
          # increasing) commit count, so the tag is unique to this build and a
          # release can never already exist for it. Releases from previous
          # builds are left untouched.
          #
          # --prerelease=false is explicit: a release flagged as a prerelease
          # cannot also be marked --latest (GitHub returns "Latest release
          # cannot be draft or prerelease.").
          gh release create "$VERSION" "${ASSETS[@]}" \
            --title "OpenLieroX ${VERSION_FULL}" \
            --notes "$NOTES" \
            --prerelease=false \
            --latest \
            --target "$GITHUB_SHA"
