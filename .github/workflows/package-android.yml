name: Build

on:
  pull_request:
  push:
    branches:
      - master
      - 0.59

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout openlierox
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libboost-dev \
            xz-utils \
            zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK + cmdline-tools
        uses: android-actions/setup-android@v3
        with:
          packages: ""

      - name: Install NDK and build-tools via sdkmanager
        run: |
          set -eu
          # `yes | sdkmanager --licenses` exits non-zero under
          # `set -o pipefail` because sdkmanager closes stdin after
          # consuming enough y's and `yes` gets SIGPIPE. Run it in a
          # subshell without pipefail and ignore its exit code.
          (yes || true) | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> "$GITHUB_ENV"

      - name: Clone commandergenius port
        # The Android build uses an external commandergenius checkout as
        # the SDL2/Gradle/NDK harness. The repo pulls in ~100 submodules
        # (one per application port it supports — teeworlds, xserver, etc.)
        # but openlierox only needs libraries under project/jni/. Two
        # classes of submodule URL in that repo fail on GitHub Actions:
        #   - git:// URLs: GitHub disabled the protocol in 2022
        #   - git@github.com: (SSH) URLs: require keys the runner lacks
        # Clone without submodules, force https:// for any URL, then init
        # only project/jni/ entries (excluding project/jni/application/*).
        run: |
          set -euo pipefail
          git clone --depth 1 \
            https://github.com/pelya/commandergenius.git \
            "$HOME/commandergenius"
          cd "$HOME/commandergenius"
          git config --global url."https://github.com/".insteadOf "git://github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          mapfile -t NEEDED < <(git submodule status | awk '{print $2}' | grep '^project/jni/' | grep -v '^project/jni/application/')
          echo "Initialising ${#NEEDED[@]} port submodules…"
          # --recursive so sdl2_image's own submodules (external/jpeg,
          # external/libpng, etc.) are also fetched; without them the
          # ndk-build step fails with 'Module SDL2_image depends on
          # undefined modules: jpeg png'.
          git submodule update --init --recursive --depth 1 -- "${NEEDED[@]}"
          echo "PORT_DIR=$HOME/commandergenius" >> "$GITHUB_ENV"

      - name: Create Android debug keystore
        # The port's build.sh signs release APKs with the standard
        # Android debug keystore. On a developer machine this is created
        # by the SDK on first use; on a fresh CI runner it doesn't
        # exist, so apksigner aborts with FileNotFoundException. Create
        # it up front with the conventional storepass/keypass/alias
        # (android / android / androiddebugkey).
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
              keytool -genkeypair -v \
                  -keystore "$HOME/.android/debug.keystore" \
                  -storepass android -keypass android \
                  -alias androiddebugkey \
                  -dname 'CN=Android Debug,O=Android,C=US' \
                  -keyalg RSA -keysize 2048 -validity 10000
          fi

      - name: Build APK
        run: |
          set -euo pipefail
          export PORT_DIR="$HOME/commandergenius"
          export ANDROID_SDK_ROOT="$ANDROID_SDK_ROOT"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/build-tools/36.0.0:$ANDROID_NDK_HOME:$PATH"
          ./build-android.sh --sync-data

      - name: Rename APK with version tag
        id: apk
        run: |
          set -euo pipefail
          VERSION="$(tr '_' '~' < VERSION)"
          NAME="openlierox-${VERSION}-android.apk"
          mv build-output/openlierox-android.apk "build-output/${NAME}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload openlierox-android
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: build-output/openlierox-*-android.apk
          if-no-files-found: error
