name: Build Windows

on:
  pull_request:
  # Reusable: invoked by release-beta.yml on merges to master.
  workflow_call:

jobs:
  build-windows:
    name: Build Windows .exe (MSYS2 MinGW64)
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-libgd
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libzip
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openal
            mingw-w64-x86_64-freealut
            mingw-w64-x86_64-libvorbis
            mingw-w64-x86_64-yaml-cpp
            mingw-w64-x86_64-ntldd-git
            zip

      - name: Build
        run: ./.github/workflows/build-windows.sh

      - name: Package
        run: ./.github/workflows/package-windows.sh

      # Zip the bundle in the build job (like mac and linux-bundle) so a single
      # ready-to-publish archive is uploaded rather than a loose directory that
      # the release job has to re-zip.
      - name: Archive bundle
        id: bundle
        run: |
          set -euo pipefail
          cd distrib
          dir="$(basename openlierox-*-win64)"
          zip -r -q "${dir}.zip" "$dir"
          echo "name=${dir}.zip" >> "$GITHUB_OUTPUT"

      - name: Upload openlierox-win64
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.bundle.outputs.name }}
          path: distrib/openlierox-*-win64.zip
          if-no-files-found: error
