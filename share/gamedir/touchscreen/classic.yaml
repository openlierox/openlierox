# classic.yaml — modeled after the commandergenius OpenLieroX port.
#
# Reference: project/jni/application/openlierox/AndroidAppSettings.cfg
# in pelya/commandergenius. That config wires four on-screen action
# buttons to OLX 0.58's player-1 bindings via:
#
#   RedefinedKeysScreenKb     = "LALT  X  LCTRL  LSHIFT"
#   RedefinedKeysScreenKbNames= "Jump  Rope Shoot SelectWeapon"
#   AppUsesJoystick=y                       # on-screen joystick on the left
#   TouchscreenKeysTheme=3                  # 'Keen' — round joystick
#
# The original SDL port had no Prev/Next-Weapon button — you cycled
# weapons by HOLDingStart SelectWeapon and tapping Left/Right. On a
# touchscreen the modifier-plus-direction gesture is awkward, so this
# layout splits SelectWeapon into dedicated PREV / NEXT buttons. The
# weapon picker uses the same shape as the other layouts (Random +
# DONE on the right) so all pickers look identical.
#
# Differences from the original SDL port:
#   - Adds a MENU corner button. Modern Android often has no hardware
#     Back key, which is how the commandergenius port reached the
#     in-game menu.
#   - Our schema bounds the joystick zone only by `area_right`, so the
#     joystick is the entire left half rather than a fixed disc in the
#     lower-left. Touching anywhere left of the action cluster anchors
#     the stick.
#
# Coordinates are in OLX's logical 640x480 frame.

name: Classic
description: >
  Modeled after the original commandergenius OpenLieroX Android port:
  action buttons clustered on the right, Keen-theme icons. Prev/Next
  weapon buttons replace the classic SelectWeapon modifier (harder to
  do with a thumb than on a keyboard).

# No outlines — flatter look, matches the user's current preference.
button-border: false

# Invisible virtual joystick.
# area_right is kept just left of the action cluster so a finger landing
# on FIRE doesn't accidentally anchor the joystick.
vjoy:
  area_right: 480
  walk_sensitivity: 40
  aim_sensitivity: 40

# Minimap position (top-left, logical 640x480) while the touch UI is
# visible. Right-aligned (640 - 128 = 512 for the default 128-wide
# minimap) and sat above the action cluster (top row at y=250 — 96
# minimap height + 24 px gap = y 130).
minimap:
  x: 512
  y: 130

# In-game (LM_PLAYING).
# 2-wide grid on the right edge, shifted down to make room for the
# minimap above the cluster:
#     PREV   NEXT      (y=250, weapon cycle)
#     FIRE   ROPE      (y=315, primary actions = LCTRL / X)
#          JUMP        (y=380, centered = LALT)
#
# Button artwork is the original Keen theme from the commandergenius port
# (project/themes/Keen in pelya/commandergenius), copied verbatim to
# share/gamedir/touchscreen/images/. The renderer auto-loads the
# "<name>_pressed.png" variant for the held state. The weapon-cycle
# buttons use rotated selweap art — prev_weapon.png is selweap.png
# rotated 90 degrees (clockwise), next_weapon.png is rotated 270.
playing:
  - { x: 560, y:   5, w:  75, h:  40, action: menu,                       label: "MENU" }
  - { x: 485, y: 250, w:  60, h:  60, action: prev_weapon,                label: "<<",   image: prev_weapon.png }
  - { x: 580, y: 250, w:  60, h:  60, action: next_weapon,                label: ">>",   image: next_weapon.png }
  - { x: 485, y: 315, w:  60, h:  60, action: hold, binding: shoot,       label: "FIRE", image: shoot.png   }
  - { x: 580, y: 315, w:  60, h:  60, action: hold, binding: rope,        label: "ROPE", image: rope.png    }
  - { x: 540, y: 380, w:  60, h:  60, action: hold, binding: jump,        label: "JUMP", image: jump.png    }

# Weapon picker (LM_WEAPON_SELECT).
# Same picker UI as the rightside layout — D-pad on the lower-left,
# Random / DONE stacked on the right edge. (Classic OLX itself never
# had a randomise shortcut; we adopt the modern UI here so all layouts
# share the same picker.)
weapon_select:
  - { x: 560, y:   5, w:  75, h:  40, action: menu,                       label: "MENU"   }
  - { x:  60, y: 240, w:  80, h:  70, action: hold, binding: up,          label: "^"      }
  - { x:  60, y: 400, w:  80, h:  70, action: hold, binding: down,        label: "v"      }
  - { x:   0, y: 320, w:  80, h:  70, action: hold, binding: left,        label: "<"      }
  - { x: 140, y: 320, w:  80, h:  70, action: hold, binding: right,       label: ">"      }
  - { x: 525, y: 240, w: 110, h:  95, action: randomize,                  label: "Random" }
  - { x: 525, y: 345, w: 110, h:  95, action: done,                       label: "DONE"   }
